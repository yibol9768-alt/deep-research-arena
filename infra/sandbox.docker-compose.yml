# Sandbox-in-a-box for the DR Benchmark
#
# Brings up 4 containers on a single docker network so an external
# contributor can run any agent against the same offline sandbox we use
# in our paper:
#
#   * shopping  (Magento, port 7770)        — product corpus
#   * reddit    (Postmill, port 9999)       — forum corpus
#   * wiki      (Kiwix, port 8090)          — Wikipedia snapshot
#   * gateway   (FastAPI search_shim, 8081) — Tavily / Firecrawl / Brave /
#                Serper / SearxNG / DDG / OpenAI / Anthropic compat shims;
#                proxies LLM calls to ds_proxy (8088)
#
# Usage:
#   docker compose -f infra/sandbox.docker-compose.yml up -d
#   curl http://localhost:8081/healthz                   # gateway
#   curl http://localhost:7770/                          # Magento
#   curl http://localhost:9999/                          # Postmill
#   curl http://localhost:8090/                          # Kiwix
#
# Then point your agent at:
#   TAVILY_API_URL=http://localhost:8081
#   OPENAI_BASE_URL=http://localhost:8081/llm/v1
#   (any auth token works — gateway accepts arbitrary Bearer)
#
# Image notes (registry: ghcr.io/<your-org>/dr-benchmark):
#   - shopping_final_0712     ~ 4.2 GB   contains scraped product DB
#   - postmill-populated      ~ 1.8 GB   contains scraped forum DB
#   - kiwix-en-wiki-2025-09   ~ 28  GB   en.wikipedia snapshot
#   - dr-bench-gateway        ~  90 MB   FastAPI shim
#
# If you can't pull these images, see infra/build-images.md for offline
# scrape + image-build instructions (uses scripts/build_deep_golden.py to
# regenerate the corpora).

# Note: top-level `version` was dropped as it's now ignored by docker compose v2+.

services:
  shopping:
    # Local dev: image built from envs/shopping/ scrape (~141 GB on disk).
    # Public release will be retagged to ${SANDBOX_REGISTRY}/shopping_final_0712.
    image: ${SANDBOX_SHOPPING_IMAGE:-shopping_final_0712:latest}
    container_name: dr_sandbox_shopping
    restart: unless-stopped
    ports:
      - "${SHOPPING_PORT:-7770}:80"
    environment:
      MAGENTO_BASE_URL: "http://localhost:7770"
    networks: [sandbox]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s   # Magento takes ~60s to warm up

  reddit:
    # Local dev: image built from envs/reddit/ scrape (~107 GB on disk).
    # Public release will be retagged to ${SANDBOX_REGISTRY}/postmill-populated.
    image: ${SANDBOX_REDDIT_IMAGE:-postmill-populated-exposed-withimg:latest}
    container_name: dr_sandbox_reddit
    restart: unless-stopped
    ports:
      - "${REDDIT_PORT:-9999}:80"
    networks: [sandbox]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  wiki:
    # Public Kiwix server image; Wikipedia content comes from a host-mounted
    # .zim file (28 GB en-wiki snapshot). On westd the snapshot lives at
    # /opt/corpus/wiki/. Outside contributors can download a .zim from
    # https://download.kiwix.org/zim/wikipedia/ and set WIKI_ZIM_DIR.
    image: ${SANDBOX_WIKI_IMAGE:-ghcr.io/kiwix/kiwix-serve:latest}
    container_name: dr_sandbox_wiki
    restart: unless-stopped
    ports:
      - "${WIKI_PORT:-8090}:8080"
    volumes:
      - ${WIKI_ZIM_DIR:-./infra/wiki-zim}:/data:ro
    # The kiwix-serve image's ENTRYPOINT already runs `kiwix-serve --port=8080`,
    # so `command:` should only list ZIM file paths. westd uses
    # wikipedia_en_simple_all_maxi.zim; set WIKI_ZIM_FILE to override.
    command: ["/data/${WIKI_ZIM_FILE:-wikipedia_en_simple_all_maxi.zim}"]
    networks: [sandbox]
    healthcheck:
      # kiwix-serve listens on 8080 (per --port arg above).
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  ds_proxy:
    # OpenAI-compat proxy to DeepSeek-V4 with thinking-disabled auto-injection.
    # 3rd-party submitters bring their own DEEPSEEK_API_KEY; we don't ship
    # one in the public image. If the env var is unset, ds_proxy returns
    # 500 with a clear "set DEEPSEEK_API_KEY" error.
    image: ${SANDBOX_DS_PROXY_IMAGE:-dr-bench-ds-proxy:latest}
    container_name: dr_sandbox_ds_proxy
    restart: unless-stopped
    environment:
      # ds_proxy reads OPENAI_PROXY_KEY and OPENAI_PROXY_UPSTREAM directly.
      # 3rd-party submitters bring their own DeepSeek key; we don't ship one.
      OPENAI_PROXY_UPSTREAM: "${DEEPSEEK_API_BASE:-https://api.deepseek.com}"
      OPENAI_PROXY_KEY:      "${DEEPSEEK_API_KEY:-}"
      OPENAI_PROXY_EMB_KEY:  "${DASHSCOPE_API_KEY:-}"
    networks: [sandbox]
    expose: ["8088"]   # not published — accessed via gateway

  gateway:
    image: ${SANDBOX_GATEWAY_IMAGE:-dr-bench-gateway:latest}
    container_name: dr_sandbox_gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8081}:8081"
    environment:
      SHIM_LLM_UPSTREAM: "http://ds_proxy:8088/v1"
      # search_shim/backend.py reads these names directly:
      SHOPPING: "http://shopping:80"
      REDDIT:   "http://reddit:80"
      KIWIX:    "http://wiki:8080"
      KIWIX_BOOK: "${WIKI_KIWIX_BOOK:-wikipedia_en_simple_all_maxi}"
    depends_on:
      shopping:  { condition: service_healthy }
      reddit:    { condition: service_healthy }
      wiki:      { condition: service_healthy }
      ds_proxy:  { condition: service_started }
    networks: [sandbox]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

networks:
  sandbox:
    driver: bridge
