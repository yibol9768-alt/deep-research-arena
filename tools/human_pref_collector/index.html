<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Deep Research Arena - Human Pairwise Preference Collector</title>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #666;
    --bg: #fafafa;
    --panel: #fff;
    --border: #d8d8d8;
    --accent: #2b6cb0;
    --accent-warm: #d97706;
    --chip-bg: #f0f0f0;
    --chip-active: #2b6cb0;
    --chip-active-fg: #fff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
  }
  header {
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .progress { color: var(--muted); }
  header .annotator { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  header .annotator input {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    width: 160px;
  }
  .task-card {
    background: var(--panel);
    margin: 8px 16px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 22vh;
    overflow-y: auto;
  }
  .task-card h2 {
    margin: 0 0 4px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .task-card .task-id { color: var(--accent); font-family: monospace; }
  .task-card .prompt { white-space: pre-wrap; font-size: 13px; }
  .task-card .must-cite {
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
  }
  .reports {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 0 16px 8px;
  }
  .report {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    height: 60vh;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .report-header {
    position: sticky;
    top: -12px;
    background: var(--panel);
    padding: 6px 0;
    margin: -12px 0 6px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  .report-header .agent-id { font-family: monospace; color: var(--fg); }
  .report-body { font-size: 13px; }
  .report-body h1, .report-body h2, .report-body h3 { font-weight: 600; margin: 12px 0 6px; }
  .report-body h1 { font-size: 17px; }
  .report-body h2 { font-size: 15px; }
  .report-body h3 { font-size: 14px; }
  .report-body p { margin: 6px 0; }
  .report-body code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .report-body pre { background: #f4f4f4; padding: 8px; border-radius: 4px; overflow-x: auto; }
  .report-body a { color: var(--accent); }
  .report-body table { border-collapse: collapse; margin: 8px 0; }
  .report-body th, .report-body td { border: 1px solid var(--border); padding: 4px 8px; }
  .controls {
    background: var(--panel);
    margin: 0 16px 12px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .controls .winners {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .controls .winners button {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.1s;
  }
  .controls .winners button:hover { background: #f4f4f4; }
  .controls .winners button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .controls .winners button.tie.active {
    background: var(--muted);
    border-color: var(--muted);
  }
  .controls .chips-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .controls .chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .controls .chip {
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--chip-bg);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    border: 1px solid transparent;
  }
  .controls .chip.active {
    background: var(--chip-active);
    color: var(--chip-active-fg);
  }
  .controls .actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .controls .actions .next {
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .controls .actions .next:disabled { background: var(--muted); cursor: not-allowed; }
  .controls .actions .status { color: var(--muted); font-size: 12px; }
  .controls .actions .status.error { color: #c53030; }
  .controls .actions .status.success { color: #2f855a; }
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }
</style>
</head>
<body>
<header>
  <h1>Deep Research Arena - Human Pairwise Preference</h1>
  <span class="progress" id="progress">Loading...</span>
  <div class="annotator">
    <label for="annotator">Annotator:</label>
    <input id="annotator" placeholder="your name" />
  </div>
</header>

<section class="task-card" id="task-card">
  <div class="empty">Loading task...</div>
</section>

<div class="reports">
  <div class="report" id="report-a">
    <div class="report-header">Report A - <span class="agent-id" id="agent-a">-</span></div>
    <div class="report-body" id="body-a"></div>
  </div>
  <div class="report" id="report-b">
    <div class="report-header">Report B - <span class="agent-id" id="agent-b">-</span></div>
    <div class="report-body" id="body-b"></div>
  </div>
</div>

<section class="controls">
  <div class="winners">
    <button data-winner="a" id="btn-a">Prefer A</button>
    <button data-winner="tie" class="tie" id="btn-tie">Tie</button>
    <button data-winner="b" id="btn-b">Prefer B</button>
  </div>
  <div class="chips-label">Why? (multi-select; optional)</div>
  <div class="chips" id="chips">
    <span class="chip" data-dim="depth">more depth</span>
    <span class="chip" data-dim="checklist">better citations</span>
    <span class="chip" data-dim="style">clearer style</span>
    <span class="chip" data-dim="rigor">more rigorous</span>
    <span class="chip" data-dim="coverage">better coverage</span>
    <span class="chip" data-dim="spec">better spec compliance</span>
    <span class="chip" data-dim="other">other</span>
  </div>
  <div class="actions">
    <button class="next" id="btn-next" disabled>Submit and load next pair</button>
    <span class="status" id="status"></span>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
(function () {
  "use strict";

  const state = {
    pair: null,
    winner: null,
    dims: new Set(),
    cursor: 0,
    total: 0,
    serverOnline: true,
  };

  // ---------- Markdown rendering ----------
  function renderMd(target, text) {
    if (typeof marked !== "undefined") {
      target.innerHTML = marked.parse(text || "", { breaks: false });
    } else {
      // Minimal fallback if CDN is unreachable: preserve newlines.
      target.textContent = text || "";
    }
  }

  // ---------- UI helpers ----------
  function setWinner(w) {
    state.winner = w;
    document.querySelectorAll(".winners button").forEach((b) => {
      b.classList.toggle("active", b.dataset.winner === w);
    });
    updateSubmitButton();
  }

  function toggleChip(dim) {
    if (state.dims.has(dim)) state.dims.delete(dim);
    else state.dims.add(dim);
    document.querySelectorAll(".chip").forEach((c) => {
      c.classList.toggle("active", state.dims.has(c.dataset.dim));
    });
  }

  function updateSubmitButton() {
    const ann = document.getElementById("annotator").value.trim();
    document.getElementById("btn-next").disabled = !(state.winner && ann);
  }

  function setStatus(msg, kind) {
    const el = document.getElementById("status");
    el.textContent = msg || "";
    el.className = "status" + (kind ? " " + kind : "");
  }

  // ---------- Data flow ----------
  function loadPair() {
    setStatus("Loading next pair...");
    fetch("/pairs")
      .then((r) => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then((data) => {
        state.serverOnline = true;
        if (data.done) {
          document.getElementById("task-card").innerHTML =
            '<div class="empty">All pairs annotated. Thank you.</div>';
          document.getElementById("body-a").textContent = "";
          document.getElementById("body-b").textContent = "";
          document.getElementById("progress").textContent =
            "All " + (data.total || 0) + " pairs complete";
          document.getElementById("btn-next").disabled = true;
          return;
        }
        state.pair = data;
        state.cursor = data.cursor || 0;
        state.total = data.total || 0;
        renderPair(data);
        setStatus("");
      })
      .catch((e) => {
        state.serverOnline = false;
        document.getElementById("task-card").innerHTML =
          '<div class="empty">Could not reach the local server.<br>' +
          "Run <code>python tools/human_pref_collector/server.py --port 8000</code> " +
          "and refresh.<br><small>" + e.message + "</small></div>";
        setStatus("Server offline - using clipboard fallback on submit.", "error");
      });
  }

  function renderPair(data) {
    document.getElementById("progress").textContent =
      "Pair " + (data.cursor + 1) + " of " + data.total;

    const card = document.getElementById("task-card");
    let html =
      '<h2>Task <span class="task-id">' +
      escapeHtml(data.task_id || "?") +
      "</span></h2>";
    if (data.task_intent) {
      html +=
        '<div class="prompt">' + escapeHtml(data.task_intent) + "</div>";
    }
    if (data.must_cite_urls && data.must_cite_urls.length) {
      html +=
        '<div class="must-cite">Must-cite URLs (' +
        data.must_cite_urls.length +
        "): " +
        data.must_cite_urls
          .slice(0, 6)
          .map((u) => '<code>' + escapeHtml(u) + '</code>')
          .join(", ") +
        (data.must_cite_urls.length > 6 ? ", ..." : "") +
        "</div>";
    }
    card.innerHTML = html;

    document.getElementById("agent-a").textContent = data.agent_a || "?";
    document.getElementById("agent-b").textContent = data.agent_b || "?";
    renderMd(document.getElementById("body-a"), data.report_a_md || "(empty)");
    renderMd(document.getElementById("body-b"), data.report_b_md || "(empty)");

    state.winner = null;
    state.dims = new Set();
    document
      .querySelectorAll(".winners button")
      .forEach((b) => b.classList.remove("active"));
    document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
    updateSubmitButton();

    document.getElementById("report-a").scrollTop = 0;
    document.getElementById("report-b").scrollTop = 0;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[c]));
  }

  function submit() {
    const ann = document.getElementById("annotator").value.trim();
    if (!state.winner || !ann || !state.pair) return;

    const payload = {
      task_id: state.pair.task_id,
      agent_a: state.pair.agent_a,
      agent_b: state.pair.agent_b,
      winner: state.winner,
      dims_cited: Array.from(state.dims),
      annotator: ann,
      timestamp: new Date().toISOString(),
    };

    document.getElementById("btn-next").disabled = true;

    if (!state.serverOnline) {
      copyToClipboard(JSON.stringify(payload));
      setStatus(
        "Server offline - JSON copied to clipboard. Paste into data/human_prefs/prefs.jsonl manually.",
        "error"
      );
      return;
    }

    fetch("/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then((r) => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(() => {
        setStatus("Saved. Loading next...", "success");
        loadPair();
      })
      .catch((e) => {
        copyToClipboard(JSON.stringify(payload));
        setStatus(
          "Save failed (" +
            e.message +
            "). JSON copied to clipboard as fallback.",
          "error"
        );
        document.getElementById("btn-next").disabled = false;
      });
  }

  function copyToClipboard(text) {
    try {
      navigator.clipboard.writeText(text);
    } catch (e) {
      // Older browsers: silently no-op. The user can also view the JSON in
      // devtools network panel.
    }
  }

  // ---------- Wiring ----------
  document.querySelectorAll(".winners button").forEach((b) => {
    b.addEventListener("click", () => setWinner(b.dataset.winner));
  });
  document.querySelectorAll(".chip").forEach((c) => {
    c.addEventListener("click", () => toggleChip(c.dataset.dim));
  });
  document.getElementById("annotator").addEventListener("input", updateSubmitButton);
  document.getElementById("btn-next").addEventListener("click", submit);

  // Persist annotator name across reloads.
  const saved = localStorage.getItem("dra_annotator");
  if (saved) document.getElementById("annotator").value = saved;
  document
    .getElementById("annotator")
    .addEventListener("change", (e) =>
      localStorage.setItem("dra_annotator", e.target.value)
    );

  // Keyboard shortcuts: a / s / d for prefer-A / tie / prefer-B, enter to submit.
  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "a") setWinner("a");
    else if (e.key === "s") setWinner("tie");
    else if (e.key === "d") setWinner("b");
    else if (e.key === "Enter" && !document.getElementById("btn-next").disabled) submit();
  });

  loadPair();
})();
</script>
</body>
</html>
