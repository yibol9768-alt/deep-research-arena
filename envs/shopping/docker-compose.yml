services:
  shopping:
    image: shopping_final_0712:latest
    container_name: webarena_shopping
    restart: unless-stopped
    ports:
      - "7770:80"
    environment:
      MAGENTO_BASE_URL: "http://${HOST_HOSTNAME:-localhost}:7770"
    networks:
      - webarena_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

networks:
  webarena_net:
    driver: bridge
